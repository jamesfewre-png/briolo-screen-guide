<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; pointer-events: none; }
    canvas { width: 100vw; height: 100vh; display: block; background: transparent; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="overlay"></canvas>
  <div id="navBtn" style="display:none;position:fixed;left:50%;transform:translateX(-50%);top:calc(13vh + 50px);z-index:10;pointer-events:auto;">
    <button id="navLink" style="background:#ff8a00;color:#111;border:0;border-radius:8px;padding:10px 26px;font-weight:700;font-size:15px;cursor:pointer;font-family:Inter,system-ui,sans-serif;white-space:nowrap;box-shadow:0 2px 16px rgba(0,0,0,0.5);">Open page &#8594;</button>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
