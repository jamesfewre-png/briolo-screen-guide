<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>AI Screen Guide</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f1a; color: #e8e8f0; width: 320px; padding: 20px; min-height: 100vh; }
h1 { font-size: 18px; font-weight: 700; color: #ff8a00; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
.card { background: #1a1a2e; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a45; }
.step-counter { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.step-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.instruction { font-size: 13px; color: #c0c0d0; line-height: 1.5; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
  font-weight: 600; margin-top: 10px; }
.badge-green { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
.badge-amber { background: #3a2a00; color: #ff9800; border: 1px solid #ff9800; }
.badge-red { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
.progress-bar { height: 3px; background: #2a2a45; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: #ff8a00; border-radius: 3px; transition: width 0.4s; }
.btn { width: 100%; padding: 11px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; margin-bottom: 8px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #ff8a00; color: #fff; }
.btn-secondary { background: transparent; color: #e8e8f0; border: 1px solid #3a3a5a; }
.btn-danger { background: transparent; color: #f44336; border: 1px solid #f44336; }
.btn-start { background: #ff8a00; color: #fff; font-size: 15px; padding: 14px; }
.status { font-size: 12px; color: #888; text-align: center; margin-top: 4px; }
#start-screen p { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 20px; }
.divider { border: none; border-top: 1px solid #2a2a45; margin: 12px 0; }
</style>
</head>
<body>
<h1>AI Screen Guide</h1>
<p class="subtitle">Browser-based workflow guidance</p>

<div id="start-screen">
<div class="card">
    <p>Guides you step-by-step through connecting Meta Business assets to Briolo. Click below to start.</p>
  </div>
  <button class="btn btn-start" id="btn-start">Start Meta Connection &rarr;</button>
</div>

<div id="workflow-screen" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="card">
    <div class="step-counter">Step <span id="step-num">1</span> of <span id="step-total">7</span></div>
    <div class="step-name" id="step-name">&mdash;</div>
    <div class="instruction" id="instruction-text">&mdash;</div>
    <div id="confidence-badge"></div>
  </div>
  <button class="btn btn-primary" id="btn-next">&#10003; Mark Complete &amp; Next</button>
  <button class="btn btn-secondary" id="btn-stuck">? I&apos;m Stuck &mdash; Highlight Again</button>
  <hr class="divider">
  <button class="btn btn-danger" id="btn-stop">&#10007; Stop Guidance</button>
  <div class="status" id="status-msg"></div>
</div>

<script src="panel.js"></script>
</body>
</html>
